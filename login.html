<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sign in</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div
      id="loginpage"
      class="w-full max-w-md bg-amber-50 shadow-2xl rounded-2xl p-6"
    >
      <h1
        class="text-2xl md:text-3xl lg:text-4xl font-bold text-gray-400 text-center mb-6"
      >
        LOGIN
      </h1>

      <form id="form">
        <div>
          <label class="block font-serif mb-1">USER NAME:</label>
          <input
            type="text"
            id="username"
            placeholder="enter your username"
            class="w-full h-10 rounded-xl px-3 bg-amber-100 outline-none"
          />
        </div>

        <div>
          <label class="block font-serif mb-1"> PASSWORD:</label>
          <input
            type="password"
            id="password"
            placeholder="enter your password"
            class="w-full h-10 rounded-xl px-3 bg-amber-100 outline-none"
          />
        </div>
        <p id="error" class="text-red-500-sm"></p>

        <button
          id="submit"
          class="w-full bg-amber-200 text-lg rounded-xl py-2 mt-4 hover:bg-amber-100 text-white"
        >
          LOGIN
        </button>
      </form>
    </div>

    <div
      id="profile"
      class="h-150 relative hidden w-full max-w-md bg-amber-100 shadow-2xl rounded-2xl p-6"
    >
      <h2 id="welcome" class="text-xl font-bold">welcome!</h2>
      <label for="username" class="text-amber-950 font-sans text-xl"
        >username:</label
      >
      <div
        class="absolute w-80 w-md:90 top-12 h-10 rounded-xl px-3 bg-amber-50 outline-none left-30"
      ></div>
      <label for="email" class="text-amber-950 font-sans text-xl top-32 left-30"
        >email:</label
      >
      <div
        class="absolute w-80 w-md:90 top-32 h-10 rounded-xl px-3 bg-amber-50 outline-none left-30"
      ></div>

      <!-- <button onclick="logout" class="mt-4 bg-red-400 px-4 py-2 rounded text-white">logout</button> -->
    </div>

    <script>
      function fetchpost() {
        return fetch("https://dummyjson.com/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: username.value,
            password: password.value,
            expiresInMins: 1,
          }),
          credentials: "include",
        }).then((res) => res.json());
      }

      const form = document.getElementById("form");
      const username = document.getElementById("username");
      const password = document.getElementById("password");
      const error = document.getElementById("error");

  </body>
</html>
