<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">

 
  <div class="bg-yellow-100 p-4">
    <h1 class="text-4xl md:text-6xl font-bold">To-do</h1>
  </div>

 
  <div class="flex flex-col md:flex-row">

    <div class="w-full md:w-1/4 bg-white shadow-md p-4 space-y-4">
      <h2 class="text-3xl font-bold">Inbox</h2>

      <div class="space-y-2">
        <div class="bg-yellow-50 p-2 rounded">⭐ Today</div>
        <div class="bg-lime-50 p-2 rounded">📅 Upcoming</div>
        <div class="bg-yellow-50 p-2 rounded">📍 Anytime</div>
        <div class="bg-lime-50 p-2 rounded">🧾 Some Day</div>
        <div class="bg-yellow-50 p-2 rounded">📖 Logbook</div>
      </div>
    </div>

    <div class="flex-1 p-6">

     
      <div class="flex gap-2 mb-5">
        <input id="taskInput" type="text"
          placeholder="Type your Activities..."
          class="flex-1 bg-yellow-50 h-10 border-2 border-yellow-300 rounded px-2">

        <button onclick="addTask()"
          class="bg-black text-white px-4 rounded">
          Add
        </button>
      </div>

      
      <div id="taskList" class="space-y-2"></div>

    </div>

  </div>
  <script>
    
    function addTask() {
      let input = document.getElementById("taskInput");
      let taskText = input.value.trim();
      if (taskText === "") return;
      let taskdiv=document.createElement("div");
      taskdiv.className="flex items-center justify-between bg-yellow-50 p-3 rounded shadow"; 
      
      let leftbox = document.createElement("div");
      leftbox.className="flex items-center gap-2"

      let checkbox=document.createElement("checkbox");
      checkbox.type="check box";

      let text = document.createElement("span");
      text.innerText = taskText;

       checkbox.onchange = function () {
        if (checkbox.checked) {
          text.classList.add("line-through", "text-gray-400");
        } else {
          text.classList.remove("line-through", "text-gray-400");
        }
      };
      leftBox.appendChild(checkbox);
      leftBox.appendChild(text);
      
      
      let btnBox = document.createElement("div");
      btnBox.className = "flex gap-2";

       let editBtn = document.createElement("button");
      editBtn.innerText = "✏️";
      editBtn.onclick = function () {
        let newText = prompt("Edit your task:", text.innerText);
        if (newText !== null && newText.trim() !== "") {
          text.innerText = newText;
        }
      };

      let delBtn = document.createElement("button");
      delBtn.innerText = "❌";
      delBtn.onclick = function () {
        taskDiv.remove();
      };

       btnBox.appendChild(editBtn);
      btnBox.appendChild(delBtn);

      taskDiv.appendChild(leftBox);
      taskDiv.appendChild(btnBox);

      document.getElementById("taskList").appendChild(taskDiv);

      input.value = "";
    }



    //    let y=document.createElement("li");
    //     y.innerHTML=x;
    //      let u=document.getElementById("task");
    //     u.appendChild(y);
    //      input.value="";
    </script>

</body>
</html>
