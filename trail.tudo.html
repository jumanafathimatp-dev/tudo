<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">
   

  <div class="bg-yellow-100 p-4">
    <h1 class="text-4xl md:text-6xl font-bold">To-do</h1> 
  </div>


    <div class="flex flex-col md:flex-row">

   
     <div class="w-full md:w-1/4 bg-white shadow-md p-4 space-y-4">
        <h2 class="text-3xl font-bold">Inbox</h2>

        <div class="space-y-2">
         
         
        <div class="bg-yellow-50 p-2 rounded">⭐ Today</div>
        <div class="bg-lime-50 p-2 rounded">📅 Upcoming</div>
        <div class="bg-yellow-50 p-2 rounded">📍 Anytime</div>
        <div class="bg-lime-50 p-2 rounded">🧾 Some Day</div>
        <div class="bg-yellow-50 p-2 rounded">📖 Logbook</div>
        </div>
    </div>

    <div class="flex-1 p-6">

    
      <div class="flex gap-2 mb-5">
  <input id="taskInput" type="text" placeholder="Type your Activities..." class="flex-1 bg-yellow-50 h-10 border-2 border-yellow-300 rounded px-2">

  <button onclick="addTask()" class="bg-black text-white px-4 rounded">
    Add
  </button>
</div>

<div class="bg-white rounded-lg shadow-md p-6">
  <ul id="taskList" class="space-y-2"></ul>
</div>

    </div>

 
  <script src="./src/main.js"></script>


  





    




</body>
</html>
