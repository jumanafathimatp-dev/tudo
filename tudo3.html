<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">
   

  <div class="bg-yellow-100 p-4">
    <h1 class="text-4xl md:text-6xl font-bold">To-do</h1>
  </div>


  <div class="flex flex-col md:flex-row">

   
    <div class="w-full md:w-1/4 bg-white shadow-md p-4 space-y-4">
      <h2 class="text-3xl font-bold">Inbox</h2>

      <div class="space-y-2">
        <div class="bg-yellow-50 p-2 rounded">⭐ Today</div>
        <div class="bg-lime-50 p-2 rounded">📅 Upcoming</div>
        <div class="bg-yellow-50 p-2 rounded">📍 Anytime</div>
        <div class="bg-lime-50 p-2 rounded">🧾 Some Day</div>
        <div class="bg-yellow-50 p-2 rounded">📖 Logbook</div>
      </div>
    </div>

    <div class="flex-1 p-6">

    
      <div class="flex gap-2 mb-5">
  <input id="taskInput" type="text" placeholder="Type your Activities..." class="flex-1 bg-yellow-50 h-10 border-2 border-yellow-300 rounded px-2">

  <button onclick="addTask()" class="bg-black text-white px-4 rounded">
    Add
  </button>
</div>

<div class="bg-white rounded-lg shadow-md p-6">
  <ul id="taskList" class="space-y-2"></ul>
</div>

    </div>

 
  <script>
   function addTask(){
    let input = document.getElementById("taskInput");
    let text = input.value; 

   let li = document.createElement("li");
   li.className = "flex justify-between items-center bg-yellow-100 p-2 rounded";

  

  

  input.value = "";
  
  // if(input.value === ""){
  //   return;
  // }

  let div=document.createElement("div");
  div.className="flex items center gap-2 ";


  let checkbox=document.createElement("input");
  checkbox.type="checkbox";

  let span=document.createElement("span");
  span.innerText=text;

 

  checkbox.onclick =function(){
    if (checkbox.checked){
      span.classList.add("line-through");
    }

     else{
      span.classList.remove("line-through");
     }
    

    

  };
   
 
  div.appendChild(checkbox);
  div.appendChild(span);

  li.appendChild(div);

  let button=document.createElement("button");
  button.innerText="❌";
  button.className=" l-250";

  button.addEventListener("click",function(){
    li.remove();
  })

  
  

    div.appendChild(button);

   let edit=document.createElement("button");
   edit.innerText="✏️";
   edit.className=""
   div.appendChild(edit);
     
    edit.addEventListener("click",function(){

   

      let inbox=document.createElement("input");
      inbox.className=("flex items-center bg-white");
      li.appendChild(inbox);
      inbox.value=span.textContent;

      inbox.addEventListener("keydown",function(e){
        if(e.key === "enter"){
          span.innerText=inbox.value;

        }

        div.replaceChild(inbox.value,span.innerText);
      

      })

    




   })
  



  

  document.getElementById("taskList").appendChild(li);

  // input.value = "";
 }
</script>
</body>
</html>
